name: assop2b-__ENV__

services:
  website:
    container_name: assop2b-__ENV__-website
    build:
      context: ./assop2b-website
    environment:
      NUXT_API_BASE_URL: https://${DOMAIN_API}
      NUXT_CMS_API_KEY: ${WEBSITE_CMS_API_KEY}
      NUXT_PUBLIC_SITE_URL: https://${DOMAIN_WEBSITE}
    expose:
      - "3000"
    networks:
      - assop2b-__ENV__

  fe-admin:
    container_name: assop2b-__ENV__-fe-admin
    build:
      context: ./assop2b-fe-admin
      args:
        VITE_API_BASE_URL: https://${DOMAIN_API}/api
    expose:
      - "80"
    networks:
      - assop2b-__ENV__

  be-admin:
    container_name: assop2b-__ENV__-be-admin
    build:
      context: ./assop2b-be-admin
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: assop2b-be-admin-__ENV__
    expose:
      - "8080"
    networks:
      - assop2b-__ENV__

  n8n:
    container_name: assop2b-__ENV__-n8n
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_HOST: ${DOMAIN_N8N}
      N8N_PROTOCOL: https
      N8N_PORT: "5678"
      WEBHOOK_URL: https://${DOMAIN_N8N}/
      N8N_PROXY_HOPS: "1"
      GENERIC_TIMEZONE: Europe/Rome
    expose:
      - "5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - assop2b-__ENV__

volumes:
  n8n_data:

networks:
  assop2b-__ENV__:
    name: assop2b-__ENV__
