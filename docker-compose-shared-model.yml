services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    env_file:
      - .env.shared
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
__CADDY_NETWORKS__

  postgres:
    image: postgres:16-alpine
    container_name: assop2b-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env.shared
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
__POSTGRES_NETWORKS__
      - assop2b-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    container_name: assop2b-elasticsearch
    image: elasticsearch:7.17.27
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      xpack.security.enabled: "false"
      cluster.routing.allocation.disk.threshold_enabled: "true"
      cluster.routing.allocation.disk.watermark.low: 512mb
      cluster.routing.allocation.disk.watermark.high: 256mb
      cluster.routing.allocation.disk.watermark.flood_stage: 128mb
    expose:
      - "9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - assop2b-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -E -q '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  temporal:
    container_name: assop2b-temporal
    image: temporalio/auto-setup:1.27.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    env_file:
      - .env.shared
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${TEMPORAL_DB_USER}
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD}
      DBNAME: temporal
      SKIP_DB_CREATE: "true"
      ENABLE_ES: "true"
      ES_SEEDS: elasticsearch
      ES_VERSION: v7
      BIND_ON_IP: "0.0.0.0"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
      SKIP_DEFAULT_NAMESPACE_CREATION: "true"
    ports:
      - "7233:7233"
    networks:
__TEMPORAL_NETWORKS__
      - assop2b-internal
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7233 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  temporal-ui:
    container_name: assop2b-temporal-ui
    image: temporalio/ui:2.37.2
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "8080:8080"
    networks:
      - assop2b-internal

  otel-lgtm:
    container_name: assop2b-otel-lgtm
    image: grafana/otel-lgtm:0.28.0
    restart: unless-stopped
    env_file:
      - .env.shared
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3300:3000"
    expose:
      - "4317"
      - "4318"
    volumes:
      - otel_lgtm_data:/data
    networks:
__OTEL_LGTM_NETWORKS__
      - assop2b-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  alloy:
    container_name: assop2b-alloy
    image: grafana/alloy:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    networks:
      - assop2b-internal
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--server.http.listen-addr=0.0.0.0:12345"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  elasticsearch_data:
  otel_lgtm_data:

networks:
  assop2b-internal:
    name: assop2b-internal
__EXTERNAL_NETWORKS__
